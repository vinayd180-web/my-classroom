<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Live Classroom</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #222; color: white; display: flex; height: 100vh; overflow: hidden; }
        #role-selector { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .role-btn { padding: 15px 40px; margin: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-t { background: #4CAF50; color: white; }
        .btn-s { background: #008CBA; color: white; }
        #main-layout { display: flex; width: 100%; height: 100%; flex: 1; }
        #left-panel { flex: 3; display: flex; flex-direction: column; position: relative; background: #111; height: 100%; }
        #controls { display: flex; background: #333; padding: 10px; align-items: center; flex-wrap: wrap; gap: 10px; z-index: 10; }
        .control-btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #board-container { flex: 1; position: relative; background: #074227; width: 100%; height: 100%; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; display: block; }
        #right-panel { flex: 1; display: flex; flex-direction: column; border-left: 2px solid #444; background: #1a1a1a; min-width: 300px; height: 100%; }
        #video-container { height: 200px; position: relative; background: #000; display: flex; justify-content: center; align-items: center; border-bottom: 2px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #chat-container { flex: 1; display: flex; flex-direction: column; padding: 10px; height: calc(100% - 200px); }
        #chat-messages { flex: 1; overflow-y: auto; background: #2a2a2a; padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 14px; word-break: break-all; }
        #chat-input-area { display: flex; gap: 5px; }
        #chat-input { flex: 1; padding: 8px; border-radius: 4px; border: none; background: #333; color: white; }
        #chat-send { padding: 8px 15px; background: #008CBA; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="role-selector">
        <h2>Smart Live Classroom Setup</h2>
        <button class="role-btn btn-t" onclick="selectRole('teacher')">Host as Teacher</button>
        <button class="role-btn btn-s" onclick="selectRole('student')">Join as Student</button>
    </div>

    <div id="main-layout">
        <div id="left-panel">
            <div id="controls">
                <button class="control-btn" style="background:#f44336; color:white;" onclick="clearBoard()">Clear Board</button>
                <span style="font-size:14px;">Chalk Color:</span>
                <input type="color" id="color-picker" value="#ffffff" onchange="changeColor(this.value)">
                <button id="change-pass-btn" style="display:none; background:#ff9800; color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:4px; font-weight:bold;" onclick="changeStudentPassword()">🔑 Change Student Pass</button>
            </div>
            <div id="board-container">
                <canvas id="paint-board"></canvas>
            </div>
        </div>

        <div id="right-panel">
            <div id="video-container">
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                    <button id="chat-send" onclick="sendChatMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let userRole = '';
        let targetStudentPassword = "student2026"; 
        let localStream;
        
        const canvas = document.getElementById('paint-board');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#ffffff';

        // सर्वर से लेटेस्ट पासवर्ड अपडेट प्राप्त करना
        socket.on('init-student-password', (pass) => {
            targetStudentPassword = pass;
        });

        // पासवर्ड वेरिफिकेशन और रोल सिलेक्शन
        async function selectRole(role) {
            if (role === 'teacher') {
                const password = prompt("कृपया टीचर सीक्रेट पिन (PIN) दर्ज करें:");
                if (password !== "1234") {
                    alert("गलत पासवर्ड! आप टीचर मोड एक्सेस नहीं कर सकते।");
                    return;
                }
            }
            
            if (role === 'student') {
                const studentPass = prompt("क्लास में एंट्री के लिए स्टूडेंट पासवर्ड दर्ज करें:");
                if (studentPass !== targetStudentPassword) {
                    alert("गलत पासवर्ड! आप क्लास में ज्वाइन नहीं कर सकते।");
                    return;
                }
            }

            userRole = role;
            document.getElementById('role-selector').style.display = 'none';
            
            if(userRole === 'teacher') {
                document.getElementById('change-pass-btn').style.display = 'block';
            }
            
            socket.emit('register-role', role);
            
            // कैनवास को सही साइज देना
            setTimeout(resizeCanvas, 100);

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
            } catch(err) { 
                console.log("Camera error:", err);
            }
        }

        // टीचर द्वारा पासवर्ड बदलने का फंक्शन
        function changeStudentPassword() {
            const newPass = prompt("नया स्टूडेंट पासवर्ड दर्ज करें:", targetStudentPassword);
            if (newPass && newPass.trim() !== "") {
                socket.emit('update-student-password', newPass.trim());
                alert("स्टूडेंट पासवर्ड बदलकर यह कर दिया गया है: " + newPass);
            }
        }

        // बोर्ड का सही रीसाइज़ लॉजिक
        function resizeCanvas() {
            const container = document.getElementById('board-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3;
            ctx.strokeStyle = currentColor;
        }
        window.addEventListener('resize', resizeCanvas);

        // माउस इवेंट्स (PC के लिए)
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mousemove', draw);

        // टच इवेंट्स (मोबाइल के लिए)
        canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchend', () => { stopDrawing(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });

        function startDrawing(e) {
            if (userRole !== 'teacher') return;
            drawing = true;
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing || userRole !== 'teacher') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.strokeStyle = currentColor;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);

            socket.emit('draw', { x, y, color: currentColor });
        }

        // सर्वर से ड्राइंग डेटा रिसीव करना
        socket.on('draw', (data) => {
            ctx.strokeStyle = data.color;
            ctx.lineTo(data.x, data.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(data.x, data.y);
        });

        function changeColor(color) { currentColor = color; }
        
        function clearBoard() {
            if(userRole !== 'teacher') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('clear-board');
        }
        socket.on('clear-board', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); });

        // लाइव चैट लॉजिक
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() === '') return;
            const name = userRole === 'teacher' ? 'Teacher' : 'Student';
            socket.emit('chat-message', { name, text: input.value });
            input.value = '';
        }

        socket.on('chat-message', (data) => {
            const msgDiv = document.getElementById('chat-messages');
            msgDiv.innerHTML += `<div><strong>${data.name}:</strong> ${data.text}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    </script>
</body>
</html>
