<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Live Classroom</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            background-color: #1f1f1f;
            padding: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #333;
        }
        #main-container {
            display: flex;
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #board-container {
            flex: 3;
            position: relative;
            background-color: #074227;
            margin: 10px;
            border: 4px solid #8B4513;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #1f1f1f;
            padding: 10px;
            border-left: 2px solid #333;
            height: 100%;
        }
        #video-container {
            width: 100%;
            height: 200px;
            background-color: black;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #chat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 10px;
            overflow: hidden;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 5px;
        }
        #messages div {
            margin-bottom: 8px;
            padding: 6px;
            background-color: #3d3d3d;
            border-radius: 4px;
        }
        #chat-input-container {
            display: flex;
            gap: 5px;
        }
        #chat-input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background-color: #444;
            color: white;
        }
        #send-btn {
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        #clear-btn { background-color: #dc3545; }
        #color-picker {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
    </style>
</head>
<body>

    <div id="header">🔴 Live Smart Classroom Dashboard</div>

    <div id="main-container">
        <div id="board-container">
            <canvas id="classroom-board"></canvas>
            <div id="controls">
                <button id="clear-btn" class="btn" onclick="clearBoard()">Clear Board</button>
                <input type="color" id="color-picker" value="#ffffff" onchange="changeColor(this.value)">
            </div>
        </div>

        <div id="right-panel">
            <div id="video-container">
                <video id="classroom-video" autoplay playsinline muted></video>
            </div>
            <div id="chat-box">
                <div id="messages"></div>
                <div id="chat-input-container">
                    <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('classroom-board');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#ffffff';

        // बोर्ड का साइज सेट करना
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3;
            ctx.strokeStyle = currentColor;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('load', resizeCanvas);

        // ड्राइंग इवेंट्स (माउस और टच दोनों के लिए)
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchend', () => { stopDrawing(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });

        function startDrawing(e) {
            drawing = true;
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);

            socket.emit('draw', { x, y, color: currentColor });
        }

        socket.on('draw', (data) => {
            ctx.strokeStyle = data.color;
            ctx.lineTo(data.x, data.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(data.x, data.y);
        });

        function changeColor(color) {
            currentColor = color;
            ctx.strokeStyle = color;
        }

        function clearBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('clear-board');
        }

        socket.on('clear-board', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // लाइव कैमरा चालू करना
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                document.getElementById('classroom-video').srcObject = stream;
            })
            .catch(err => console.log("Camera loading skip or error:", err));

        // चैट सिस्टम
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (input.value.trim() === '') return;
            socket.emit('chat-message', input.value);
            input.value = '';
        }

        socket.on('chat-message', (msg) => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div>${msg}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    </script>
</body>
</html>
